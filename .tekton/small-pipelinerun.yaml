---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: pac-pull-request-short-name-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"
    pipelinesascode.tekton.dev/task: "git-clone"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  pipelineSpec:
    tasks:
      - name: noop-task
        displayName: Task with no effect
        runAfter:
          - fetch-repository
        workspaces:
          - name: source
            workspace: source
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: noop-task
              image: registry.access.redhat.com/ubi10/ubi-micro
              workingDir: $(workspaces.source.path)
              script: |
                echo "Wow - This is working"
                exit 0
